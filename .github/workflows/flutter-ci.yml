# Runs on PRs and pushes to main. Analyze only; tests run when test/ exists.
name: Flutter CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: |
          if [ -d test ] && [ -n "$(find test -name '*.dart' -print -quit)" ]; then
            flutter test
          else
            echo "No test directory or tests found; skipping."
          fi

