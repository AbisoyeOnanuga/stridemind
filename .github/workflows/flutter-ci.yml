# Runs on PRs and pushes to main.
# This template always runs analyze. Tests run only when *_test.dart files exist.
name: Flutter CI

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Run Flutter tests (if present)
        if: ${{ hashFiles('test/**/*_test.dart') != '' }}
        run: flutter test

      - name: Skip tests (template has no test files yet)
        if: ${{ hashFiles('test/**/*_test.dart') == '' }}
        run: echo "::notice::No *_test.dart files found. This is expected until tests are added."

