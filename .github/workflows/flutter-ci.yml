# Runs on PRs and pushes to main. Analyze only; tests run when test/ exists.
name: Flutter CI

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        if: ${{ hashFiles('test/**/*_test.dart') != '' }}
        run: flutter test

      - name: No tests found
        if: ${{ hashFiles('test/**/*_test.dart') == '' }}
        run: echo "No test directory or *_test.dart files found; skipping."

